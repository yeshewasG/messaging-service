services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messaging_api
    # ports:
    #   - "${PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - messaging_net
      - traefik-net
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.messaging.rule=Host(`messaging.adeylab.com`)"
      - "traefik.http.routers.messaging.entrypoints=websecure"
      - "traefik.http.routers.messaging.tls.certresolver=leresolver"
      - "traefik.http.services.messaging.loadbalancer.server.port=5000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messaging_worker
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - messaging_net
    command: node dist/workers/message.worker.js

  redis:
    image: redis:7
    container_name: redis_messaging
    restart: always
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - messaging_net

volumes:
  redis_data:

networks:
  messaging_net:
    driver: bridge
  traefik-net:
    external: true
